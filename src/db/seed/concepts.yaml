# MVP 初期 10 concept (docs/10-taxonomy-seed.md から抜粋)
#
# 真実の源の階層:
#   - 設計 (name / difficulty_levels / tags / prereqs の意図): docs/10-taxonomy-seed.md
#   - 実行時 (DB に投入される concept): このファイル (src/db/seed/concepts.yaml)
# 追加・改名は必ず両者を同一 PR で同期する。
# YAML から concept を消した場合、run.ts が DB 側の orphan を警告するので
# 手動で retire / restore を判断する。

concepts:
  # programming (3)
  - id: programming.basics.value_vs_reference
    name: 値渡しと参照渡し
    domain: programming
    subdomain: basics
    description: 変数・引数が参照共有されるか、コピーされるかの違い
    difficulty_levels: [beginner, junior]
    tags: [memory, semantics]

  - id: programming.async.event_loop
    name: イベントループ
    domain: programming
    subdomain: async
    description: JavaScript/Node.js のタスクキューとマイクロタスクの実行順
    difficulty_levels: [junior, mid]
    tags: [concurrency, javascript]

  - id: programming.async.promise_async_await
    name: Promise / async-await の挙動
    domain: programming
    subdomain: async
    description: 非同期合成の落とし穴 (未 await・エラー伝播・並列化)
    prereqs: [programming.async.event_loop]
    difficulty_levels: [junior, mid]

  # dsa (2)
  - id: dsa.complexity.big_o
    name: Big O 記法
    domain: dsa
    subdomain: complexity
    description: 入力サイズに対する計算量の漸近的記述
    difficulty_levels: [beginner, junior]

  - id: dsa.structures.hash_map
    name: ハッシュマップ (衝突解決含む)
    domain: dsa
    subdomain: structures
    description: 平均 O(1) のキー探索、衝突解決と負荷率
    difficulty_levels: [junior, mid]
    tags: [hashing]

  # network (2)
  - id: network.http.methods_idempotency
    name: HTTP メソッドとベキ等性
    domain: network
    subdomain: http
    description: GET/POST/PUT/DELETE/PATCH の意味と安全性・冪等性
    difficulty_levels: [junior, mid]

  - id: network.http.status_codes
    name: ステータスコードの使い分け
    domain: network
    subdomain: http
    description: 2xx/3xx/4xx/5xx の分類と代表的な落とし穴 (301 vs 308 など)
    difficulty_levels: [beginner, junior, mid]

  # db (1)
  - id: db.rdb.btree_index
    name: B-tree インデックス
    domain: db
    subdomain: rdb
    description: B-tree インデックスの仕組みと、どのクエリを高速化できるか
    difficulty_levels: [junior, mid, senior]

  # tools (1)
  - id: tools.git.branching_merging
    name: ブランチ戦略と merge / rebase
    domain: tools
    subdomain: git
    description: 共有ブランチでのマージ / rebase の使い分け、チームでの履歴設計
    difficulty_levels: [junior, mid]

  # frontend (1)
  - id: frontend.react.hooks_rules
    name: フックのルールと依存配列
    domain: frontend
    subdomain: react
    description: Hooks の呼び出し順序 / 条件分岐で呼ばない理由 / useEffect の依存配列
    difficulty_levels: [junior, mid]
    tags: [pitfall]

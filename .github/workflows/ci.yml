name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: typecheck / lint / test / build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Check if Next.js project exists
        id: has_pkg
        run: |
          if [ -f package.json ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::package.json がまだ無いためセットアップ系ステップをスキップ (Phase 0 前)"
          fi

      - name: Setup pnpm
        if: steps.has_pkg.outputs.present == 'true'
        uses: pnpm/action-setup@v4

      - name: Setup Node
        if: steps.has_pkg.outputs.present == 'true'
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install
        if: steps.has_pkg.outputs.present == 'true'
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        if: steps.has_pkg.outputs.present == 'true'
        run: pnpm typecheck

      - name: Lint
        if: steps.has_pkg.outputs.present == 'true'
        run: pnpm lint

      - name: Test
        if: steps.has_pkg.outputs.present == 'true'
        run: pnpm test -- --run

      - name: Build
        if: steps.has_pkg.outputs.present == 'true'
        env:
          # CI ビルド通過用のダミー (ADR-0006: GitHub OAuth に移行)
          DATABASE_URL: postgresql://dummy:dummy@localhost/dummy?sslmode=disable
          OPENAI_API_KEY: sk-dummy
          GITHUB_CLIENT_ID: dummy
          GITHUB_CLIENT_SECRET: dummy
          GITHUB_ALLOWED_USER_ID: "1"
          SESSION_COOKIE_SECRET: 00000000000000000000000000000000
          NEXT_PUBLIC_APP_URL: http://localhost:3000
        run: pnpm build
